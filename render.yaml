services:
  - type: web
    name: wealthtrack-api
    runtime: node
    buildCommand: npm ci
    startCommand: npm run start --workspace server
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        sync: false
